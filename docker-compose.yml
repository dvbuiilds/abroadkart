# ─────────────────────────────────────────────────────────────────────────────
# AbroadKart — full local stack
#
# Prerequisites: copy .env.example to .env in this directory (gitignored).
# Docker Compose loads .env for variable substitution in this file only.
#
# Root `.env` is the single Next.js env file; `keystone/.env` is the single Keystone file.
# For keystone / nextjs services, DATABASE_URL (and Keystone REDIS_URL) are set below so
# Docker uses hostnames `postgres` and `redis` — overrides URLs that point at localhost in those files.
# Next.js server-side proxies use KEYSTONE_INTERNAL_URL=http://keystone:3001 (inside the Docker
# network); browsers still use NEXT_PUBLIC_KEYSTONE_URL=http://localhost:3001 from `.env`.
# Keystone fetches JWKS from Next.js via BETTER_AUTH_JWKS_URL=http://nextjs:3000/... (not localhost).
#
# Start order (enforced by depends_on + healthchecks):
#   1. postgres  ──┐
#   2. redis     ──┴──▶  3. keystone  ──▶  4. nextjs
#
# First-time setup — run this ONCE after Postgres is up:
#   docker exec -it abroadkart-postgres psql -U postgres -d abroadkart -c 'CREATE SCHEMA IF NOT EXISTS auth;'
#   docker exec -it abroadkart-keystone yarn db:push
#   (from repo root, with DATABASE_URL + BETTER_AUTH_* set) yarn auth:migrate
#   docker exec -it abroadkart-keystone yarn seed          (optional)
#
# Endpoints (local):
#   Next.js frontend     → http://localhost:3000
#   Keystone GraphQL     → http://localhost:3001/api/graphql
#   Keystone Admin UI    → http://localhost:3001/admin
#
# For DigitalOcean deployment, see DEPLOY.md.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── 1. PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: abroadkart-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: abroadkart
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - abroadkart
    # Keep port mapping for connecting with a local DB client (TablePlus, etc.)
    # Remove in production if you don't need external DB access (see DEPLOY.md).
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── 2. Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: abroadkart-redis
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - abroadkart
    # Keep port mapping for connecting with a local Redis client (RedisInsight, etc.)
    # Remove in production if you don't need external Redis access (see DEPLOY.md).
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── 3. KeystoneJS ─────────────────────────────────────────────────────────────
  keystone:
    build:
      context: ./keystone
      dockerfile: Dockerfile
    container_name: abroadkart-keystone
    env_file:
      - ./keystone/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/abroadkart
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      BETTER_AUTH_JWKS_URL: http://nextjs:3000/api/auth/jwks
    ports:
      - "3001:3001"
    networks:
      - abroadkart
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── 4. Next.js ────────────────────────────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_KEYSTONE_URL: ${NEXT_PUBLIC_KEYSTONE_URL:-http://localhost:3001}
    container_name: abroadkart-nextjs
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/abroadkart
      KEYSTONE_INTERNAL_URL: http://keystone:3001
    ports:
      - "3000:3000"
    networks:
      - abroadkart
    depends_on:
      - keystone
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  abroadkart:
    driver: bridge
